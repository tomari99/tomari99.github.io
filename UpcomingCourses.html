<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background: #f1f1f2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    html {
      position: relative;
      min-height: 100%;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .h1,
    .h2,
    .h3,
    .h4,
    .h5,
    .h6 {
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    textarea:focus,
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="datetime"]:focus,
    input[type="datetime-local"]:focus,
    input[type="date"]:focus,
    input[type="month"]:focus,
    input[type="time"]:focus,
    input[type="week"]:focus,
    input[type="number"]:focus,
    input[type="email"]:focus,
    input[type="url"]:focus,
    input[type="search"]:focus,
    input[type="tel"]:focus,
    input[type="color"]:focus,
    select:focus,
    .uneditable-input:focus {
      border-color: #bd9b60;
      box-shadow: none;
      outline: 0 none !important;
    }
    p {
      font-size: 16px;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;

      letter-spacing: 1px;
    }

    .jumbotron {
      width: 100%;
      min-height: 450px;
      background: url("https://s122939.gridserver.com/clients/conversant/images/driving.jpg")
        center center;
      background-size: cover;
      opacity: 1;
      display: table;
      width: 100%;
      position: relative;
      border-radius: 0px;
      color: white;
      text-transform: uppercase;
      margin: 0;

      -webkit-clip-path: polygon(0 0%, 100% 0, 100% 100%, 0% 85%);
      clip-path: url(#poly);
      overflow: hidden;
    }
    .jumbotron h1 {
      font-size: 50px;
    }
    .jumbotron h2 {
      font-size: 18px;
      margin: 0;
    }

    .main-content {
      padding-top: 25px;
    }
    .main-content .white-box {
      padding: 25px;
      margin: 25px 0;
      background: #fff;
    }
    .main-content ul {
      list-style: initial;
      margin-left: 15px;
    }
    .main-content .final-cta {
      font-size: 18px;
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
    }
    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 3px;
      margin-top: -100px;
    }
    .form-container div {
      margin: 20px 0;
    }
    .form-container input,
    .form-container select {
      border: none;
      border-bottom: 1px solid #ccc;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;
      font-size: 12px;
      padding: 3px 0;
      border-radius: 0px;
      box-shadow: none;
      -webkit-appearance: none;
      color: #000;
      letter-spacing: 1px;
    }
    .form-container option {
      margin: 0;
    }
    .form-container label {
      display: none;
    }
    .form-container h4 {
      margin: 0;
    }
    .form-container .placeholder {
      color: #000 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;
    }
    select option:first-child {
      display: none;
    }
    ::-webkit-input-placeholder {
      color: #000 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: Gibson-Light;
    }
    .form-container .btn-primary {
      background: #00af66;
      padding: 15px 0;
      border-radius: 3px;
      font-family: "Montserrat", sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      color: white;
    }

    :-moz-placeholder {
      /* Firefox 18- */
      color: #000 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;
    }

    ::-moz-placeholder {
      /* Firefox 19+ */
      color: #000 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;
    }

    :-ms-input-placeholder {
      color: #000 !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: "Open Sans", sans-serif;
      font-weight: 300;
    }

    @media (min-width: 320px) and (max-width: 480px) {
      .jumbotron {
        min-height: 460px;
        padding: 5px 15px;
      }
      .jumbotron h1 {
        font-size: 30px;
      }
      .jumbotron h2 {
        font-size: 16px;
      }
    } /**** END 320 and 480 ****/
  </style>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script>
    $(document).ready(function () {
      $("#nav").load("Nav.html");
      $("#footer").load("Footer.html");
    });
  </script>
  <body>
    <div id="nav"></div>
    <br /><br />
    <div
      class="main container-fluid text-center d-flex flex-column align-items-center p-5"
      id="main-wrapper"
    >
      <div class="col-md-6 col-md-offset-1 main-content">
        <h3>Upcoming Courses</h3>
        <div class="white-box">
          <p>No Upcoming Courses right now</p>
        </div>
      </div>
    </div>
    <div id="footer"></div>
  </body>
</html>
