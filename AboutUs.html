<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Us</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#nav").load("Nav.html");
        $("#footer").load("Footer.html");
      });
    </script>
  </head>
  <body>
    <div id="nav"></div>

    <section id="AboutUs" class="outside">
      <div class="container-fluid text-center">
        <h1 data-aos="fade-down" data-aos-duration="1000">-About Us-</h1>
        <div class="row">
          <div class="col-sm-8">
            <div
              data-aos="fade-zoom-in"
              data-aos-easing="ease-in-back"
              data-aos-delay="500"
              data-aos-offset="0"
            >
              <p>
                New Pathway Institute is founded in 2019 just before global
                pandemic.Our institute aims to give modern advanced
                technological subjects, useful language profiency courses and
                applied management courses to today's youths with affordable
                costs.
              </p>
            </div>
          </div>
          <div class="col-sm-4">
            <img src="images/logo.jpeg" class="img" alt="NPILogo" />
          </div>
        </div>
      </div>
    </section>

    <div id="footer"></div>
    <script>
      AOS.init();
    </script>
  </body>
</html>
